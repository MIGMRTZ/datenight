name: CI

on:
  push:
    branches: ["main", "feature/**", "fix/**", "refactor/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  python:
    name: Python (lint + type + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check datenight/ tests/

      - name: Ruff format check
        run: ruff format --check datenight/ tests/

      - name: Mypy type check
        run: mypy datenight/

      - name: Pytest with coverage
        run: pytest tests/ --cov=datenight --cov-report=term-missing --cov-fail-under=80

  worker:
    name: Worker (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test

  draft-pr:
    name: Create Draft PR
    runs-on: ubuntu-latest
    needs: [python, worker]
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH — skipping"
            exit 0
          fi

          # Build title from branch name: feature/my-thing -> My thing
          TITLE=$(echo "$BRANCH" | sed 's|^[^/]*/||' | tr '-' ' ' | awk '{print toupper(substr($0,1,1)) substr($0,2)}')

          # Build body with commit list
          COMMITS=$(git log origin/main..HEAD --oneline 2>/dev/null || echo "Initial commit")
          BODY="## Summary

          Auto-created draft PR from branch \`${BRANCH}\`.

          ## Commits
          ${COMMITS}

          ---
          🤖 Generated by CI"

          gh pr create \
            --draft \
            --title "$TITLE" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH"
